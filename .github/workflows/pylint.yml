name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint pytest pytest-asyncio
    - name: Analysing the code with pylint
      run: |
        pylint --disable=C0114,C0115,C0116,C0301,C0411,C0412,C0413,C0415,C0303,E0401,R0903,R0913,R0917,R0801,W0621,W0613,W0107,W0718,W0404,W0611,W0612,W0212 $(git ls-files '*.py')
