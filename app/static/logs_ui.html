<!DOCTYPE html>
<html>
<head>
    <title>API Call Logs</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .incoming { color: blue; }
        .outgoing { color: green; }
        .webhook { color: purple; }
        .error { color: red; }
        h1 { font-size: 24px; }
        button { padding: 10px; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>API Call Logs</h1>
    <button onclick="fetchLogs()">Refresh Logs</button>
    <table>
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Type</th>
                <th>Method</th>
                <th>URL</th>
                <th>Status</th>
                <th>Time (ms)</th>
                <th>Details / Error</th>
            </tr>
        </thead>
        <tbody id="logs-body">
            <tr><td colspan="7">Loading logs...</td></tr>
        </tbody>
    </table>
    <script>
        async function fetchLogs() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const apiKey = urlParams.get('api_key');
                const headers = {};
                if (apiKey) {
                    headers['X-API-Key'] = apiKey;
                }

                const response = await fetch('/logs', { headers });
                const data = await response.json();
                const logs = data.logs;
                const tbody = document.getElementById('logs-body');
                tbody.innerHTML = '';

                if (logs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7">No logs available.</td></tr>';
                    return;
                }

                // Function to escape HTML to prevent XSS
                function escapeHtml(unsafe) {
                    if (!unsafe) return '';
                    return unsafe
                         .toString()
                         .replace(/&/g, "&amp;")
                         .replace(/</g, "&lt;")
                         .replace(/>/g, "&gt;")
                         .replace(/"/g, "&quot;")
                         .replace(/'/g, "&#039;");
                }

                // Reverse logs to show newest first
                logs.reverse().forEach(log => {
                    const tr = document.createElement('tr');
                    const date = new Date(log.timestamp * 1000).toISOString();
                    const typeClass = log.type;
                    const statusClass = (log.status_code >= 400 || log.error) ? 'error' : '';
                    let details = log.error || '';
                    if (log.type === 'webhook') {
                        details = `[${log.event_type}] ${log.payload ? JSON.stringify(log.payload) : ''}`;
                    }

                    tr.innerHTML = `
                        <td>${escapeHtml(date)}</td>
                        <td class="${typeClass}"><b>${escapeHtml(log.type.toUpperCase())}</b></td>
                        <td>${escapeHtml(log.method)}</td>
                        <td>${escapeHtml(log.url)}</td>
                        <td class="${statusClass}">${escapeHtml(log.status_code)}</td>
                        <td>${escapeHtml(log.response_time_ms.toFixed(2))}</td>
                        <td class="${statusClass}">${escapeHtml(details)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error fetching logs:', error);
                document.getElementById('logs-body').innerHTML = '<tr><td colspan="7" class="error">Error loading logs.</td></tr>';
            }
        }
        // Initial fetch
        fetchLogs();
    </script>
</body>
</html>
